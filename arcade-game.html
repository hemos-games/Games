<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Blaster Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #111827, #1f2937);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .game-box {
      width: 900px;
      max-width: 95vw;
      background: #0f172a;
      border: 3px solid #38bdf8;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 {
      font-size: 28px;
      color: #38bdf8;
    }

    .stats {
      display: flex;
      gap: 18px;
      font-size: 18px;
      font-weight: bold;
    }

    canvas {
      width: 100%;
      height: 500px;
      background: radial-gradient(circle at center, #1e293b, #020617);
      border: 2px solid #334155;
      border-radius: 14px;
      display: block;
      cursor: crosshair;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: #cbd5e1;
    }

    button {
      background: #38bdf8;
      color: #020617;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="game-box">
    <div class="top-bar">
      <h1>Arcade Blaster</h1>
      <div class="stats">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">5</span></div>
        <div>Time: <span id="time">60</span>s</div>
      </div>
    </div>

    <canvas id="gameCanvas" width="900" height="500"></canvas>

    <div class="controls">
      <p>Move: A / D or Arrow Keys | Shoot: Space or Mouse Click | Aim follows mouse</p>
      <button onclick="restartGame()">Restart Game</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const timeEl = document.getElementById("time");

    let score = 0;
    let lives = 5;
    let timeLeft = 60;
    let gameOver = false;
    let keys = {};
    let targets = [];
    let blasts = [];
    let particles = [];
    let mouse = { x: 450, y: 250 };
    let timerInterval;

    const player = {
      x: 450,
      y: 440,
      width: 50,
      height: 35,
      speed: 7
    };

    function createTarget() {
      const size = Math.random() * 18 + 24;
      targets.push({
        x: Math.random() * (canvas.width - size),
        y: -size,
        size,
        speed: Math.random() * 2 + 1.5,
        color: `hsl(${Math.random() * 360}, 85%, 60%)`
      });
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);

      ctx.fillStyle = "#38bdf8";
      ctx.beginPath();
      ctx.roundRect(-player.width / 2, -player.height / 2, player.width, player.height, 10);
      ctx.fill();

      const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
      ctx.rotate(angle);
      ctx.fillStyle = "#e0f2fe";
      ctx.fillRect(15, -6, 38, 12);
      ctx.fillStyle = "#facc15";
      ctx.beginPath();
      ctx.arc(56, 0, 5, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawTargets() {
      targets.forEach(target => {
        ctx.fillStyle = target.color;
        ctx.beginPath();
        ctx.arc(target.x + target.size / 2, target.y + target.size / 2, target.size / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(target.x + target.size / 2, target.y + target.size / 2, target.size / 4, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    function shoot() {
      if (gameOver) return;

      const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
      blasts.push({
        x: player.x + Math.cos(angle) * 55,
        y: player.y + Math.sin(angle) * 55,
        dx: Math.cos(angle) * 12,
        dy: Math.sin(angle) * 12,
        radius: 5
      });
    }

    function drawBlasts() {
      ctx.fillStyle = "#facc15";
      blasts.forEach(blast => {
        ctx.beginPath();
        ctx.arc(blast.x, blast.y, blast.radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function createExplosion(x, y, color) {
      for (let i = 0; i < 12; i++) {
        particles.push({
          x,
          y,
          dx: (Math.random() - 0.5) * 8,
          dy: (Math.random() - 0.5) * 8,
          life: 25,
          color
        });
      }
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life / 25;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function update() {
      if (gameOver) return;

      if (keys["ArrowLeft"] || keys["a"] || keys["A"]) player.x -= player.speed;
      if (keys["ArrowRight"] || keys["d"] || keys["D"]) player.x += player.speed;

      player.x = Math.max(30, Math.min(canvas.width - 30, player.x));

      blasts.forEach(blast => {
        blast.x += blast.dx;
        blast.y += blast.dy;
      });

      targets.forEach(target => {
        target.y += target.speed;
      });

      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        p.life--;
      });

      blasts = blasts.filter(b => b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height);
      particles = particles.filter(p => p.life > 0);

      for (let i = targets.length - 1; i >= 0; i--) {
        const target = targets[i];
        const tx = target.x + target.size / 2;
        const ty = target.y + target.size / 2;

        if (target.y > canvas.height) {
          targets.splice(i, 1);
          lives--;
          livesEl.textContent = lives;
          if (lives <= 0) endGame();
          continue;
        }

        for (let j = blasts.length - 1; j >= 0; j--) {
          const blast = blasts[j];
          const distance = Math.hypot(blast.x - tx, blast.y - ty);

          if (distance < target.size / 2 + blast.radius) {
            createExplosion(tx, ty, target.color);
            targets.splice(i, 1);
            blasts.splice(j, 1);
            score += 10;
            scoreEl.textContent = score;
            break;
          }
        }
      }
    }

    function drawBackground() {
      ctx.fillStyle = "rgba(2, 6, 23, 0.4)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255,255,255,0.15)";
      for (let i = 0; i < 40; i++) {
        const x = (i * 137) % canvas.width;
        const y = (i * 83 + Date.now() / 40) % canvas.height;
        ctx.fillRect(x, y, 2, 2);
      }
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "48px Arial";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 30);
      ctx.font = "26px Arial";
      ctx.fillText("Final Score: " + score, canvas.width / 2, canvas.height / 2 + 15);
      ctx.font = "18px Arial";
      ctx.fillText("Click Restart Game to play again", canvas.width / 2, canvas.height / 2 + 55);
    }

    function gameLoop() {
      drawBackground();
      update();
      drawTargets();
      drawBlasts();
      drawParticles();
      drawPlayer();

      if (gameOver) drawGameOver();

      requestAnimationFrame(gameLoop);
    }

    function endGame() {
      gameOver = true;
      clearInterval(timerInterval);
    }

    function restartGame() {
      score = 0;
      lives = 5;
      timeLeft = 60;
      gameOver = false;
      targets = [];
      blasts = [];
      particles = [];
      player.x = 450;

      scoreEl.textContent = score;
      livesEl.textContent = lives;
      timeEl.textContent = timeLeft;

      clearInterval(timerInterval);
      startTimer();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        if (gameOver) return;
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame();
      }, 1000);
    }

    setInterval(() => {
      if (!gameOver) createTarget();
    }, 700);

    window.addEventListener("keydown", e => {
      keys[e.key] = true;
      if (e.code === "Space") shoot();
    });

    window.addEventListener("keyup", e => {
      keys[e.key] = false;
    });

    canvas.addEventListener("mousemove", e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
      mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
    });

    canvas.addEventListener("click", shoot);

    if (!ctx.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
        this.beginPath();
        this.moveTo(x + radius, y);
        this.lineTo(x + width - radius, y);
        this.quadraticCurveTo(x + width, y, x + width, y + radius);
        this.lineTo(x + width, y + height - radius);
        this.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        this.lineTo(x + radius, y + height);
        this.quadraticCurveTo(x, y + height, x, y + height - radius);
        this.lineTo(x, y + radius);
        this.quadraticCurveTo(x, y, x + radius, y);
        this.closePath();
      };
    }

    startTimer();
    gameLoop();
  </script>
</body>
</html>
